<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文会計 単語帳</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 20px;
  }
  h1 { font-size: 1.4rem; color: #2d3748; margin-bottom: 4px; text-align: center; }
  .subtitle { color: #718096; font-size: 0.85rem; margin-bottom: 14px; text-align: center; }

  /* Share button & modal */
  .share-btn { position: fixed; top: 14px; right: 14px; padding: 8px 14px; border-radius: 20px; border: 2px solid #9f7aea; background: #fff; color: #553c9a; font-weight: bold; font-size: 0.78rem; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.1); z-index: 50; }
  .share-btn:hover { background: #9f7aea; color: #fff; }
  .share-overlay { display: none; position: fixed; inset: 0; background: rgba(45,55,72,0.55); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .share-overlay.open { display: flex; }
  .share-modal { background: #fff; border-radius: 16px; padding: 24px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.25); position: relative; }
  .share-modal h2 { font-size: 1.05rem; color: #2d3748; margin-bottom: 6px; }
  .share-modal p.desc { font-size: 0.78rem; color: #718096; margin-bottom: 14px; line-height: 1.5; }
  .share-modal img.qr { width: 220px; height: 220px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 14px; }
  .share-link-box { display: flex; gap: 6px; margin-bottom: 6px; }
  .share-link-input { flex: 1; padding: 8px 10px; border-radius: 8px; border: 2px solid #cbd5e0; font-size: 0.75rem; color: #2d3748; background: #f7fafc; }
  .share-copy-btn { padding: 8px 12px; border-radius: 8px; border: none; background: #4299e1; color: #fff; font-weight: bold; font-size: 0.75rem; cursor: pointer; white-space: nowrap; }
  .share-copy-btn:hover { background: #3182ce; }
  .share-copied { font-size: 0.72rem; color: #38a169; font-weight: bold; min-height: 1.2em; margin-bottom: 6px; }
  .share-close-btn { position: absolute; top: 10px; right: 12px; border: none; background: transparent; font-size: 1.2rem; color: #a0aec0; cursor: pointer; line-height: 1; }
  .share-close-btn:hover { color: #4a5568; }
  .share-note { font-size: 0.7rem; color: #a0aec0; margin-top: 6px; line-height: 1.4; text-align: left; }

  /* Word detail panel (shown after answering) */
  .word-detail { display: none; margin-top: 14px; padding: 14px 16px; background: #f7f5ff; border: 2px solid #d6c9f5; border-radius: 12px; text-align: left; }
  .word-detail.show { display: block; }
  .word-detail .wd-term { font-size: 1.02rem; font-weight: bold; color: #44337a; margin-bottom: 2px; }
  .word-detail .wd-ja { font-size: 0.88rem; color: #2d3748; font-weight: bold; margin-bottom: 8px; }
  .word-detail .wd-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .word-detail .wd-tag { font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; background: #e9d8fd; color: #553c9a; font-weight: bold; }
  .word-detail .wd-tag.freq1 { background: #fed7d7; color: #c53030; }
  .word-detail .wd-tag.freq2 { background: #fefcbf; color: #b7791f; }
  .word-detail .wd-tag.freq3 { background: #c6f6d5; color: #276749; }
  .word-detail .wd-note { font-size: 0.78rem; color: #4a5568; line-height: 1.5; margin-bottom: 8px; padding-left: 8px; border-left: 3px solid #cbd5e0; }
  .word-detail .wd-uscpa { font-size: 0.8rem; color: #2d3748; line-height: 1.6; }
  .word-detail .wd-uscpa::before { content: "🎓 USCPAポイント: "; font-weight: bold; color: #6b46c1; }

  /* Mode tabs */
  .mode-bar { display: flex; gap: 0; margin-bottom: 14px; border-radius: 12px; overflow: hidden; border: 2px solid #9f7aea; flex-wrap: wrap; }
  .mode-btn { padding: 8px 14px; border: none; background: #fff; cursor: pointer; font-size: 0.8rem; color: #553c9a; font-weight: bold; transition: all 0.2s; }
  .mode-btn + .mode-btn { border-left: 2px solid #9f7aea; }
  .mode-btn.active { background: #9f7aea; color: #fff; }

  /* Sub toggle (dir/quiz dir) */
  .sub-toggle { display: flex; gap: 0; margin-bottom: 12px; border-radius: 10px; overflow: hidden; border: 2px solid #4299e1; }
  .sub-btn { padding: 6px 16px; border: none; background: #fff; cursor: pointer; font-size: 0.8rem; color: #2b6cb0; font-weight: bold; transition: all 0.2s; }
  .sub-btn + .sub-btn { border-left: 2px solid #4299e1; }
  .sub-btn.active { background: #4299e1; color: #fff; }

  /* Filter bar */
  .filter-bar { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 14px; max-width: 700px; width: 100%; }
  .filter-btn { padding: 5px 13px; border-radius: 20px; border: 2px solid #cbd5e0; background: #fff; cursor: pointer; font-size: 0.8rem; color: #4a5568; transition: all 0.2s; }
  .filter-btn.active { background: #4299e1; border-color: #4299e1; color: #fff; font-weight: bold; }

  /* Progress */
  .progress-wrap { width: 100%; max-width: 480px; margin-bottom: 10px; }
  .progress-bar { background: #e2e8f0; border-radius: 8px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 8px; transition: width 0.3s; background: #48bb78; }
  .progress-text { font-size: 0.8rem; color: #718096; text-align: right; margin-top: 4px; }

  /* Stats */
  .stats { display: flex; gap: 16px; font-size: 0.82rem; color: #718096; margin-bottom: 14px; }
  .stat { text-align: center; }
  .stat strong { display: block; font-size: 1.1rem; color: #2d3748; }

  /* Flashcard */
  .card-area { perspective: 1200px; width: 100%; max-width: 480px; margin-bottom: 14px; }
  .card { width: 100%; min-height: 230px; position: relative; transform-style: preserve-3d; transition: transform 0.5s ease; cursor: pointer; }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0; border-radius: 16px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 24px 22px; backface-visibility: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.12); min-height: 230px;
  }
  .card-front { background: #fff; }
  .card-back { background: #ebf8ff; transform: rotateY(180deg); }
  .card-category { font-size: 0.72rem; font-weight: bold; letter-spacing: 1px; color: #a0aec0; margin-bottom: 10px; }
  .card-main { font-size: 1.35rem; font-weight: bold; color: #2d3748; text-align: center; line-height: 1.4; margin-bottom: 6px; }
  .card-sub { font-size: 0.82rem; color: #718096; text-align: center; font-style: italic; }
  .card-hint { font-size: 0.74rem; color: #b794f4; margin-top: 12px; }
  .card-back .card-main { font-size: 1.45rem; color: #2b6cb0; }
  .card-back .card-sub { color: #4a5568; font-style: normal; }
  .card-note { margin-top: 8px; padding: 6px 11px; background: #fefce8; border-left: 3px solid #f6ad55; border-radius: 6px; font-size: 0.76rem; color: #744210; text-align: left; line-height: 1.5; max-width: 100%; }
  .card-note-hint { margin-top: 7px; padding: 5px 10px; background: #fffbeb; border: 1px dashed #f6ad55; border-radius: 6px; font-size: 0.74rem; color: #92400e; text-align: center; line-height: 1.5; max-width: 100%; }
  .freq-badge { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; color: #fff; margin-top: 8px; }

  /* Controls */
  .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 14px; }
  .btn { padding: 9px 20px; border-radius: 10px; border: none; font-size: 0.88rem; cursor: pointer; font-weight: bold; transition: transform 0.1s, opacity 0.2s; }
  .btn:active { transform: scale(0.96); }
  .btn-prev { background: #e2e8f0; color: #4a5568; }
  .btn-next { background: #4299e1; color: #fff; }
  .btn-shuffle { background: #ed8936; color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-ok { background: #48bb78; color: #fff; }
  .btn-ng { background: #fc8181; color: #fff; }
  .result-btns { display: flex; gap: 10px; margin-bottom: 14px; }

  /* Input mode */
  .input-card { width: 100%; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); padding: 22px; margin-bottom: 14px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .input-question { font-size: 1.3rem; font-weight: bold; color: #2d3748; text-align: center; line-height: 1.4; }
  .input-qsub { font-size: 0.82rem; color: #718096; font-style: italic; }
  .input-field { width: 100%; padding: 10px 14px; border: 2px solid #cbd5e0; border-radius: 10px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
  .input-field:focus { border-color: #9f7aea; }
  .input-field.correct { border-color: #48bb78; background: #f0fff4; }
  .input-field.incorrect { border-color: #fc8181; background: #fff5f5; }
  .input-feedback { font-size: 0.95rem; font-weight: bold; text-align: center; min-height: 1.4em; }
  .input-feedback.ok { color: #38a169; }
  .input-feedback.ng { color: #e53e3e; }
  .input-answer { font-size: 0.85rem; color: #4a5568; text-align: center; line-height: 1.6; }
  .btn-check { background: #9f7aea; color: #fff; }
  .btn-skip { background: #e2e8f0; color: #4a5568; }
  .dir-note { font-size: 0.78rem; color: #718096; margin-bottom: 8px; text-align: center; }
  .limit-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 0.82rem; color: #4a5568; }
  .limit-select { padding: 4px 10px; border-radius: 8px; border: 2px solid #cbd5e0; background: #fff; font-size: 0.82rem; color: #2d3748; font-weight: bold; cursor: pointer; outline: none; }
  .limit-select:focus { border-color: #9f7aea; }
  .btn-review { background: #fff; border: 2px solid #e2e8f0; color: #718096; font-size: 0.82rem; padding: 7px 16px; }
  .btn-review.in-review { border-color: #fc8181; color: #c53030; background: #fff5f5; }

  /* ===== Quiz ===== */
  .quiz-view { width: 100%; max-width: 520px; display: none; flex-direction: column; align-items: center; }
  .quiz-view.active { display: flex; }
  .quiz-card { width: 100%; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); padding: 24px 22px; margin-bottom: 14px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .quiz-question { font-size: 1.25rem; font-weight: bold; color: #2d3748; text-align: center; line-height: 1.5; }
  .quiz-qsub { font-size: 0.82rem; color: #718096; font-style: italic; }
  .quiz-choices { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 4px; }
  .quiz-choice {
    width: 100%; padding: 12px 16px; border-radius: 12px; border: 2px solid #cbd5e0;
    background: #fff; cursor: pointer; font-size: 0.92rem; color: #2d3748; font-weight: 500;
    text-align: left; transition: border-color 0.15s, background 0.15s; line-height: 1.4;
  }
  .quiz-choice:hover:not(:disabled) { border-color: #9f7aea; background: #faf5ff; }
  .quiz-choice.selected-correct { border-color: #48bb78; background: #f0fff4; color: #276749; }
  .quiz-choice.selected-wrong { border-color: #fc8181; background: #fff5f5; color: #c53030; }
  .quiz-choice.reveal-correct { border-color: #48bb78; background: #f0fff4; color: #276749; }
  .quiz-choice:disabled { cursor: default; }
  .quiz-feedback { font-size: 0.95rem; font-weight: bold; text-align: center; min-height: 1.4em; }
  .quiz-feedback.ok { color: #38a169; }
  .quiz-feedback.ng { color: #e53e3e; }
  .quiz-note { margin-top: 4px; padding: 6px 10px; background: #fefce8; border-left: 3px solid #f6ad55; border-radius: 6px; font-size: 0.76rem; color: #744210; text-align: left; line-height: 1.5; width: 100%; display: none; }

  /* ===== Frequency tab ===== */
  .freq-view { width: 100%; max-width: 560px; display: none; flex-direction: column; align-items: center; }
  .freq-view.active { display: flex; }
  .freq-level-selector { display: flex; flex-direction: column; gap: 14px; width: 100%; margin-bottom: 6px; }
  .freq-level-card { border-radius: 16px; padding: 20px 24px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 3px 14px rgba(0,0,0,0.10); transition: transform 0.15s, box-shadow 0.15s; border: 3px solid transparent; }
  .freq-level-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.14); }
  .freq-level-card.lv1 { background: linear-gradient(135deg, #fff5f5, #fed7d7); }
  .freq-level-card.lv2 { background: linear-gradient(135deg, #fffff0, #fefcbf); }
  .freq-level-card.lv3 { background: linear-gradient(135deg, #f0fff4, #c6f6d5); }
  .freq-level-card.lv-all { background: linear-gradient(135deg, #ebf8ff, #bee3f8); }
  .freq-level-info { display: flex; flex-direction: column; gap: 4px; }
  .freq-level-title { font-size: 1.1rem; font-weight: bold; }
  .freq-level-card.lv1 .freq-level-title { color: #c53030; }
  .freq-level-card.lv2 .freq-level-title { color: #b7791f; }
  .freq-level-card.lv3 .freq-level-title { color: #276749; }
  .freq-level-card.lv-all .freq-level-title { color: #2b6cb0; }
  .freq-level-desc { font-size: 0.8rem; color: #718096; }
  .freq-level-count { font-size: 1.6rem; font-weight: bold; opacity: 0.7; }
  .freq-session { width: 100%; display: none; flex-direction: column; align-items: center; }
  .freq-session.active { display: flex; }
  .freq-back-btn { align-self: flex-start; margin-bottom: 12px; padding: 6px 14px; border-radius: 8px; border: none; background: #e2e8f0; color: #4a5568; cursor: pointer; font-size: 0.82rem; font-weight: bold; }
  .freq-header { font-size: 1rem; font-weight: bold; color: #4a5568; margin-bottom: 12px; align-self: flex-start; }

  /* List view */
  .list-view { width: 100%; max-width: 700px; display: none; }
  .list-view.active { display: block; }
  .list-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .list-table th { background: #4299e1; color: #fff; padding: 10px 14px; text-align: left; font-size: 0.85rem; }
  .list-table td { padding: 8px 14px; border-bottom: 1px solid #e2e8f0; font-size: 0.85rem; color: #4a5568; }
  .list-table tr:last-child td { border-bottom: none; }
  .list-table tr:hover td { background: #ebf8ff; }
  .cat-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; color: #fff; }

  .flashcard-view { width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; }
  .flashcard-view.hidden { display: none; }
  .input-view { width: 100%; max-width: 480px; display: none; flex-direction: column; align-items: center; }
  .input-view.active { display: flex; }

  .card-unit { font-size: 0.72rem; color: #a0aec0; margin-top: 5px; }

  @media (max-width: 520px) {
    .card-main { font-size: 1.05rem; }
    .input-question { font-size: 1.05rem; }
    .mode-btn { padding: 7px 9px; font-size: 0.74rem; }
    .quiz-question { font-size: 1rem; }
    .quiz-choice { font-size: 0.84rem; }
  }
</style>
</head>
<body>

<button class="share-btn" onclick="openShareModal()">📱 スマホで開く</button>

<h1>英文会計 単語帳</h1>
<p class="subtitle">CEEAK 英文会計パスポート — 勘定科目一覧</p>

<div class="share-overlay" id="shareOverlay" onclick="if(event.target===this) closeShareModal()">
  <div class="share-modal">
    <button class="share-close-btn" onclick="closeShareModal()">✕</button>
    <h2>📱 スマホで開く</h2>
    <p class="desc">スマホ・タブレットのカメラでQRコードを読み取るか、下のリンクを開いてください。</p>
    <img class="qr" id="shareQrImg" alt="QRコード" src="">
    <div class="share-link-box">
      <input class="share-link-input" id="shareLinkInput" type="text" readonly onclick="this.select()">
      <button class="share-copy-btn" onclick="copyShareLink()">コピー</button>
    </div>
    <div class="share-copied" id="shareCopiedMsg"></div>
    <p class="share-note" id="shareNote"></p>
  </div>
</div>

<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('flash')">カード学習</button>
  <button class="mode-btn" onclick="setMode('input')">入力問題</button>
  <button class="mode-btn" onclick="setMode('quiz')">四択問題</button>
  <button class="mode-btn" onclick="setMode('freq')">頻度別</button>
  <button class="mode-btn" onclick="setMode('list')">一覧</button>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="setFilter('all',event)">すべて</button>
  <button class="filter-btn" onclick="setFilter('BS-Assets',event)">資産 (B/S)</button>
  <button class="filter-btn" onclick="setFilter('BS-Liabilities',event)">負債 (B/S)</button>
  <button class="filter-btn" onclick="setFilter('BS-Equity',event)">資本 (B/S)</button>
  <button class="filter-btn" onclick="setFilter('IS-Revenue',event)">収益 (I/S)</button>
  <button class="filter-btn" onclick="setFilter('IS-Expenses',event)">費用 (I/S)</button>
  <button class="filter-btn" onclick="setFilter('IS-Gains',event)">利得/損失 (I/S)</button>
  <button class="filter-btn" onclick="setFilter('復習',event)">復習リスト</button>
  <button class="filter-btn" onclick="setFilter('FinStmt',event)">財務諸表</button>
  <button class="filter-btn" onclick="setFilter('Concept',event)">会計概念</button>
  <button class="filter-btn" onclick="setFilter('Method',event)">会計方法</button>
  <button class="filter-btn" onclick="setFilter('Trans',event)">取引・仕訳</button>
  <button class="filter-btn" onclick="setFilter('Org',event)">組織・制度</button>
  <button class="filter-btn" onclick="setFilter('Ratio',event)">財務指標</button>
</div>

<!-- ===== Flashcard ===== -->
<div class="flashcard-view" id="flashView">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>
  <div class="stats">
    <div class="stat"><strong id="statCorrect">0</strong>正解</div>
    <div class="stat"><strong id="statWrong">0</strong>不正解</div>
    <div class="stat"><strong id="statRemain">0</strong>残り</div>
  </div>
  <div class="card-area">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="card-category" id="cardCategory"></div>
        <div class="card-main" id="cardFrontMain"></div>
        <div class="card-sub" id="cardFrontSub"></div>
        <div class="card-note-hint" id="cardFrontNote" style="display:none"></div>
        <div class="card-hint">タップして答えを確認</div>
      </div>
      <div class="card-face card-back">
        <div class="card-category" id="cardCategoryBack"></div>
        <div class="card-main" id="cardBackMain"></div>
        <div class="card-sub" id="cardBackSub"></div>
        <div class="card-note" id="cardNote" style="display:none"></div>
        <div class="card-unit" id="cardUnit" style="display:none"></div>
      </div>
    </div>
  </div>
  <div class="result-btns" id="resultBtns" style="display:none">
    <button class="btn btn-ng" onclick="markResult(false)">✗ 覚えてない</button>
    <button class="btn btn-ok" onclick="markResult(true)">✓ 覚えた</button>
  </div>
  <div style="margin-bottom:12px;display:flex;justify-content:center;">
    <button class="btn btn-review" id="flashReviewBtn" style="display:none" onclick="toggleReview('flash')"></button>
  </div>
  <div class="controls">
    <button class="btn btn-prev" id="btnPrev" onclick="prevCard()">◀ 前へ</button>
    <button class="btn btn-shuffle" onclick="shuffleFlash()">シャッフル</button>
    <button class="btn btn-next" id="btnNext" onclick="nextCard()">次へ ▶</button>
  </div>
</div>

<!-- ===== Input ===== -->
<div class="input-view" id="inputView">
  <div class="sub-toggle">
    <button class="sub-btn active" id="inputDirJaEn" onclick="setInputDir('ja-en')">日→英（英語で回答）</button>
    <button class="sub-btn" id="inputDirEnJa" onclick="setInputDir('en-ja')">英→日（日本語で回答）</button>
  </div>
  <div class="dir-note" id="inputDirNote">日本語を見て英語を入力してください</div>
  <div class="limit-bar">
    <span>出題数：</span>
    <select class="limit-select" id="inputLimitSelect" onchange="setInputLimit(this.value)">
      <option value="0">すべて</option>
      <option value="10">10問</option>
      <option value="20">20問</option>
      <option value="30">30問</option>
      <option value="50">50問</option>
      <option value="100">100問</option>
    </select>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="iProgressFill"></div></div>
    <div class="progress-text" id="iProgressText"></div>
  </div>
  <div class="stats">
    <div class="stat"><strong id="iStatCorrect">0</strong>正解</div>
    <div class="stat"><strong id="iStatWrong">0</strong>不正解</div>

// ======== Review list ========
function toggleReview(mode) {
  const en = mode === 'flash' ? deck[idx].en
           : mode === 'input' ? iDeck[iIdx].en
           : mode === 'quiz'  ? qDeck[qIdx].en
           : fDeck[fIdx].en;
  if (reviewSet.has(en)) reviewSet.delete(en);
  else reviewSet.add(en);
  updateReviewBtn(mode, en);
}

function updateReviewBtn(mode, en) {
  const ids = {flash:'flashReviewBtn', input:'inputReviewBtn', quiz:'quizReviewBtn', freq:'freqReviewBtn'};
  const btn = document.getElementById(ids[mode]);
  if (!btn) return;
  const inReview = reviewSet.has(en);
  btn.textContent = inReview ? '★ 復習リストから削除' : '☆ 復習リストに追加';
  btn.classList.toggle('in-review', inReview);
}

function showReviewBtn(mode, en) {
  const ids = {flash:'flashReviewBtn', input:'inputReviewBtn', quiz:'quizReviewBtn', freq:'freqReviewBtn'};
  const btn = document.getElementById(ids[mode]);
  if (!btn) return;
  btn.style.display = 'inline-block';
  updateReviewBtn(mode, en);
}

function hideReviewBtn(mode) {
  const ids = {flash:'flashReviewBtn', input:'inputReviewBtn', quiz:'quizReviewBtn', freq:'freqReviewBtn'};
  const btn = document.getElementById(ids[mode]);
  if (btn) btn.style.display = 'none';
}

// ======== Helpers ========
function getFilteredCards() {
  if (currentFilter === 'all') return [...CARDS];
  if (currentFilter === '復習') return CARDS.filter(c => reviewSet.has(c.en));
  return CARDS.filter(c => c.cat === currentFilter);
}

// Normalize English for comparison
function normEn(s) {
  return s.trim().toLowerCase().replace(/\s+/g,' ').replace(/[()]/g,'').replace(/,/g,'');
}

// Normalize Japanese for comparison (strip parentheses, spaces)
function normJa(s) {
  return s.trim()
    .replace(/（[^）]*）/g,'')
    .replace(/\([^)]*\)/g,'')
    .replace(/\s/g,'')
    .replace(/・/g,'');
}

// All accepted Japanese answers for a card (synonym-aware, parentheses optional)
function acceptedJaAnswers(card) {
  const set = new Set();
  const addVariants = (str) => {
    set.add(str.trim());
    set.add(normJa(str));
    // each side of "/" is also valid
    str.split('/').forEach(p => {
      set.add(p.trim());
      set.add(normJa(p));
    });
    // strip （反対勘定）etc
    set.add(str.replace(/（[^）]*）/g,'').trim());
  };
  addVariants(card.ja);
  // Also accept ja from any card with identical English base (same semantic group = same ja)
  CARDS.filter(c => normJa(c.ja) === normJa(card.ja)).forEach(c => addVariants(c.ja));
  return [...set].filter(s => s.length > 0);
}

// Pick n random wrong choices (different ja for en-ja quiz, different en for ja-en quiz)
function pickWrongChoices(card, n, dir) {
  const pool = CARDS.filter(c => {
    if (dir === 'en-ja') return normJa(c.ja) !== normJa(card.ja);
    return normEn(c.en) !== normEn(card.en);
  });
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const seen = new Set();
  const result = [];
  for (const c of shuffled) {
    const key = dir === 'en-ja' ? normJa(c.ja) : normEn(c.en);
    if (!seen.has(key)) { seen.add(key); result.push(c); }
    if (result.length >= n) break;
  }
  return result;
}

function setNoteEl(el, note) {
  if (note) { el.textContent = note; el.style.display = 'block'; }
  else { el.style.display = 'none'; }
}

  "Current portion of long-term debt": "長期債務のうち1年以内返済分を流動負債へ区分替えする論点。B/S分類問題で必出。",
  "Long-term debt due within one year": "1年以内返済予定長期債務。borrowing側の区分替えの表現違い。refinancing（借換え）の意図と能力があれば固定のままにできる例外も押さえる。",
  "Dividends payable": "未払配当金。配当宣言日に計上される流動負債（Dr. Retained earnings / Cr. Dividends payable）。株式配当では計上しない。",
  "Advances from customers": "前受金。商品引渡前の受領額は収益でなく負債。ASC 606のcontract liabilityに相当。",
  "Unearned rent revenue": "前受賃貸料。受領済み・未稼得の負債。期間経過で Dr. Unearned rent revenue / Cr. Rent revenue。",
  "Unearned subscription revenue": "前受購読料。雑誌等の定期購読で前受した負債。発行の都度、収益に振替える。",
  "Unearned tuition revenue": "前受受講料。授業提供に応じて収益認識する。一定期間にわたる履行義務の例。",
  "Accrued interest expense": "未払利息。発生済み・未払いの利息費用。期末調整: Dr. Interest expense / Cr. Interest payable。",
  "Interest payable": "未払利息（負債側の勘定名）。notes payableとセットで利息の月割計算が問われる。",
  "Accrued rent expense": "未払賃借料。発生済み・未払いの家賃。Dr. Rent expense / Cr. Rent payable。",
  "Accrued liabilities": "未払費用の負債側表現。accrued expensesと同義でB/S上は負債として表示。",
  "Accrued salaries and wages": "未払給料賃金。給与計算期間と会計期間のずれから生じる。期末調整仕訳の定番。",
  "Salaries and wages payable": "未払給料賃金（負債勘定）。accrued salariesの相手勘定。",
  "Accrued employee compensation": "未払従業員報酬。給与・賞与・有給休暇（compensated absences：条件を満たせば負債計上）を含む広い概念。",
  "Warranty liability": "製品保証債務。販売時に見積総額を費用・負債計上（assurance型）。probable＋estimableなら認識というcontingencyの原則がFAR頻出。",
  "Income taxes payable": "未払法人所得税。当期の税法上の納税義務。deferred tax（繰延税金）との区別がFARの重要論点。",
  "Long-term notes payable": "長期の約束手形債務。無利息手形は現在価値で計上し、利息法で償却する論点が出る。",
  "Long-term loans payable": "長期借入金。1年以内返済分は毎期流動負債へ区分替え。",
  "Lease liability": "リース負債（ASC 842）。リース料総額の現在価値で当初測定し、ROU資産と両建て計上。ファイナンス／オペレーティングの分類5基準がFAR最頻出。",
  "Bonds payable": "社債。額面と実効金利の関係で発行価額が決まり（premium/discount）、実効金利法で償却。FAR計算問題の定番中の定番。",
  "Retirement benefit obligations": "退職給付債務。PBO（予測給付債務）の増減要因、勤務費用・利息費用・年金資産の期待収益などの構成がFAR上級論点。",
  "Additional paid-in capital": "資本剰余金（APIC）。発行価額のうちpar valueを超える部分。自己株式取引や株式配当でも増減する。",
  "Paid-in capital": "払込資本の総称＝Common stock + Preferred stock + APIC。稼得資本（R/E）との区分がB/S表示の基本。",
  "Preferred stock": "優先株式。配当優先権・残余財産優先権を持つ。累積的（cumulative）優先株の未払配当（arrears）はEPS計算で控除する論点が頻出。",
  "Treasury stock": "自己株式。cost法が一般的：取得時 Dr. Treasury stock（資本の控除項目）。再発行差額はAPICで調整し、損益は計上しない点が最重要。",
  "Sales returns and allowances (Contra account)": "売上返品・値引。売上のcontra勘定でnet salesの計算要素。ASC 606では返品見積りをrefund liabilityとして計上。",
  "Trade discount on sales (Contra account)": "業者割引。カタログ価格からの控除で、売上は割引後の金額で記録（そもそも帳簿に現れない）点がcash discountとの違い。",
  "Cash discounts on sales (Contra account)": "現金割引（売上割引）。早期支払インセンティブ（2/10, n/30）。gross法では割引実行時にSales discountsを計上。",
  "Rent revenue": "受取賃貸料。時の経過に応じて認識。前受・未収の調整仕訳とセットで出題される。",
  "Cost of sales (COS)": "売上原価。COGSと同義でサービス業も含む広い表現。I/Sのmultiple-step形式でnet salesの直下に表示。",
  "Selling expenses": "販売費。広告費・販売手数料・freight-out等。一般管理費と合わせてSG&Aを構成し、営業利益の計算要素。",
  "Advertising expense": "広告宣伝費。原則発生時に費用処理（将来便益が不確実なため資産計上不可）。",
  "Commission expense": "販売手数料。ASC 606では契約獲得の増分コストとして資産化できる場合がある点が上級論点。",
  "Freight-out": "売手負担の発送運賃＝販売費。freight-in（仕入運賃＝棚卸資産の原価）との区別がFAR定番のひっかけ。",
  "Administrative expense": "管理費。本社機能のコスト。売上原価にも販売費にも該当しない期間費用。",
  "Insurance expense": "支払保険料。前払保険料の期間配分により計上される期間費用。",
  "Rent expense": "賃借料。ASC 842のオペレーティングリースでは定額のlease expenseとして認識する。",
  "Gain/loss from disposition of PPE": "固定資産売却損益 = 売却価額 − 帳簿価額（取得原価 − 減価償却累計額）。売却年度の償却費を月割計上してから計算する手順が頻出。",
  "Loss on inventory valuation": "棚卸資産評価損。LCM/LCNRV適用による簿価切下げ。COGSまたは営業費用として認識。",
  "Impairment loss": "減損損失。長期性資産は①帳簿価額 vs 割引前C/F（回収可能性テスト）②帳簿価額 − 公正価値（測定）の2ステップ。GAAPでは戻入れ禁止という点がIFRSとの重要差異。",
  "Income summary": "損益集合勘定。決算の締切仕訳（closing entries）で収益・費用を集約し、差額（純利益）をR/Eへ振替える一時勘定。",
  "Annual report": "年次報告書。F/S・監査報告書・MD&A（経営者による討議と分析）等を含む。10-K（SEC提出書類）との関係も押さえる。",
  "Basic financial statements": "基本財務諸表一式：B/S・I/S・包括利益計算書・株主資本等変動計算書・C/F計算書＋注記。注記も一体である点が問われる。",
  "Notes to financial statements": "財務諸表注記。会計方針の要約・偶発事象・後発事象等を開示。full disclosure principleの具体化でF/Sと一体。",
  "Income before taxes": "税引前利益。multiple-step I/Sの段階利益の一つ。ここに税率を乗じて法人税等を算定する計算問題が出る。",
  "Net sales": "純売上高 = Gross sales − Returns and allowances − Sales discounts。gross profit率計算の分母。",
  "Income taxes": "法人税等。tax expense（会計上）とtax payable（税法上）の差が繰延税金（deferred tax）を生む——FARの重要論点。",
  "Operating income": "営業利益 = Gross profit − SG&A。本業の収益力を示し、non-operating項目（利息・売却損益）の前に表示。",
  "Operating loss": "営業損失。営業費用が売上総利益を上回る状態。NOL（欠損金）の繰越は税効果会計の論点につながる。",
  "Selling, general and administrative expenses": "販管費（SG&A）。COGS以外の営業費用の総称。multiple-step I/Sでgross profitから控除して営業利益を算定。",
  "Income (loss) from continuing operations": "継続事業利益。廃止事業（discontinued operations、税引後で区分表示）の前に表示される。I/S表示区分の頻出論点。",
  "Net of taxes": "税引後表示。廃止事業損益やOCI項目は税効果控除後の純額で表示するルール。",
  "Relevance": "目的適合性。基本的質的特性の一つで、predictive value（予測価値）＋confirmatory value（確認価値）＋materialityで構成。概念フレームワークの必須暗記事項。",
  "Neutrality": "中立性。忠実な表現（faithful representation)の構成要素（complete・neutral・free from error）の一つ。偏りのない情報。",
  "Decision-useful information": "意思決定有用性。財務報告の最上位目的。投資家・債権者の資源提供の意思決定に役立つ情報の提供。",
  "Cost-benefit relationship": "費用対効果。情報提供のコストが便益を超えてはならないという全般的制約（pervasive constraint）。",
  "Money-measurement concept": "貨幣的測定の公準。貨幣額で測定可能な事象のみ記録するという会計の前提。",
  "Monetary unit": "貨幣単位の公準。ドルの購買力が安定していると仮定（インフレを無視）する前提。",
  "Going concern": "継続企業の前提。企業が予見可能な将来にわたり事業継続すると仮定。AUDでは実質的疑義（substantial doubt）の評価と報告が頻出。",
  "Separate legal existence": "法人格。会社は株主から独立した法的主体。entity conceptの法的側面。",
  "Limited liability": "有限責任。株主の責任は出資額を限度とする。corporationの主要な特徴としてREGでも問われる。",
  "Reporting entity": "報告企業。財務報告の対象となる経済主体の範囲。連結の考え方の基礎。",
  "Industry practice": "業界慣行。GAAPの例外を正当化しうる要因の一つ（農産物の時価評価等）。",
  "Noncurrent assets": "非流動資産（固定資産）。1年またはoperating cycleを超えて保有する資産。classified B/Sの区分表示。",
  "Noncurrent liabilities": "非流動負債（固定負債）。社債・長期借入金・リース負債・繰延税金負債等。",
  "Normal operating cycle rule": "正常営業循環基準。現金→棚卸資産→売掛金→現金のサイクル内の項目は流動に分類。1年基準とのいずれか長い方を適用。",
  "One-year rule": "ワンイヤー・ルール。決算日から1年以内に現金化・決済されるものを流動に分類する基準。",
  "Revenue from contracts with customers": "顧客との契約から生じる収益（ASC 606）。5ステップモデルの適用範囲を画定する概念。リースや金融商品は適用除外。",
  "Depreciable amount": "償却可能額 = 取得原価 − 残存価額。定額法・級数法はこの額に率を掛ける（DDBは取得原価ベースな点が違い）。",
  "Residual value": "残存価額。耐用年数到来時の見積処分価額。見積り変更はprospective（将来に向かって）処理する。",
  "Service life": "耐用年数（用役提供期間）。physical lifeではなく経済的な使用期間で判断する。",
  "Amortization": "無形資産の償却。原則定額法。有形資産のdepreciation、天然資源のdepletionと用語を使い分ける。",
  "Impairment": "減損。資産の帳簿価額が回収可能額を上回る状態。GAAPの2ステップテスト（回収可能性→測定）と戻入禁止がFAR頻出。",
  "Recoverable amount": "回収可能価額（IFRS用語）。使用価値と処分コスト控除後公正価値の高い方。GAAPとIFRSの減損アプローチの違いが問われる。",
  "Reversal of impairment loss": "減損損失の戻入れ。IFRSは（のれん以外）認められるが、US GAAPは禁止——代表的な基準間差異。",
  "Long-lived assets": "長期性資産。PPEと無形資産の総称。保有目的が売却に変わればheld for sale分類（償却停止・LCM評価）。",
  "Salvage value": "残存価額（residual valueと同義）。DDB法では償却の下限としてのみ機能する点に注意。",
  "Net realizable value": "正味実現可能価額 = 見積売価 − 完成・販売コスト。FIFO・平均法の在庫はLCNRV（低価法）で評価。",
  "Lower of cost or market basis": "低価法。LIFO・小売法の在庫はLCM（marketは再調達原価、ただしNRVを上限・NRV−正常利益を下限とするmiddle value）。この3値比較の計算がFAR定番。",
  "Inventory cost flow assumptions": "原価配分の仮定（FIFO・LIFO・平均法）。物的流れと一致する必要はない点、物価変動時の利益への影響比較が頻出。",
  "Measurement": "測定。認識した項目に貨幣額を割り当てるプロセス。歴史的原価・公正価値等の測定属性の選択。",
  "Measurement basis": "測定基礎。取得原価・現在原価・実現可能価額・現在価値等。項目ごとに使い分けるmixed-attribute model。",
  "Initial measurement": "当初測定。取得時の測定（通常は取得原価＝支払対価の公正価値）。",
  "Current cost": "現在原価。同一資産を現時点で取得する場合のコスト。補足情報としての物価変動会計で登場。",
  "Replacement cost": "再調達原価。LCM評価の「market」の出発点となる値。",
  "Market rate": "市場利率（実効金利）。社債の発行価額と利息費用の計算に使用。表面利率との大小でpremium/discountが決まる。",
  "Stated rate": "表面利率（額面利率）。現金支払利息の計算にのみ使用（額面×表面利率）。",
  "Coupon rate": "クーポンレート＝表面利率。市場利率＞表面利率ならdiscount発行、逆ならpremium発行と即答できるように。",
  "Maturity date": "満期日。額面金額を償還する期日。",
  "Maturity value": "償還価額（額面金額）。満期に支払われる元本。",
  "Issue price": "発行価額 = 額面の現在価値 + 利息の年金現在価値（いずれも市場利率で割引）。この現価計算がFAR頻出。",
  "Issue at par": "パー発行（額面発行）。表面利率＝市場利率のとき。プレミアム・ディスカウントが生じない。",
  "Issue at discount": "割引発行。表面利率＜市場利率のとき額面未満で発行。discountは実効金利法で償却し利息費用を増やす。",
  "Issue at premium": "打歩発行。表面利率＞市場利率のとき額面超で発行。premiumの償却は利息費用を減らす。",
  "Redemption date": "償還期日。期限前償還では帳簿価額と償還額の差をgain/lossとして認識。",
  "Early redemption": "期限前償還。社債消滅の会計処理：帳簿価額（未償却premium/discount込み）− 買入価額 = 償還損益。",
  "Coupon bonds": "利付債。定期的にクーポン利息を支払う社債。",
  "Discount bonds": "割引債。利息を支払わず額面未満で発行し、差額が実質利息となる。",
  "Serial bond": "連続償還債。満期が分割された社債。term bond（満期一括）との対比で用語問題に出る。",
  "Dividend declaration": "配当宣言。宣言日に負債確定（Dr. R/E / Cr. Dividends payable）。宣言日・基準日・支払日の3日付で仕訳が必要なのは宣言日と支払日のみ。",
  "Date of record": "配当基準日。株主名簿確定日で仕訳不要——この点がひっかけとして頻出。",
  "Share buyback": "自社株買い。treasury stock取得。発行済株式数は不変だが流通株式数が減少しEPSが上昇する効果。",
  "Share repurchase": "自社株買いの同義語。cost法での会計処理と資本の部への影響を整理。",
  "Shareholder distributions": "株主還元。配当と自社株買いの総称。R/E・現金を減少させる。",
  "Residual claim": "残余請求権。株主は債権者への弁済後の残余財産にのみ請求権を持つ。equityの定義（residual interest）と直結。",
  "Bankruptcy": "破産。Chapter 7（清算）とChapter 11（更生）の違いはREG/BARでも登場。",
  "Interest-bearing debt": "有利子負債。leverage比率（debt-to-equity等）の計算要素。",
  "Long-term debt": "長期債務。社債・長期借入金等。1年以内返済分の流動負債への振替が定番論点。",
  "Solvency": "長期的支払能力。debt-to-equity、times interest earned等の指標で測定。liquidityとの対比が問われる。",
  "Liquidity": "流動性＝短期的支払能力。current ratio・quick ratioで測定。solvency（長期）との区別。",
  "Debt forgiveness": "債務免除。債務者は免除益を認識。troubled debt restructuring（TDR）の論点につながる。",
  "Debt-equity swap": "デット・エクイティ・スワップ。債務を株式に転換する再建手法。消滅した債務の帳簿価額と株式の公正価値の差を損益認識。",
  "Revenue-related accruals": "収益側の見越し（未収収益）。稼得済み・未受領。期末調整仕訳の4類型（未収・前受・未払・前払）の一つとして整理。",
  "Revenue-related prepayments": "収益側の繰延べ（前受収益）。受領済み・未稼得の負債。稼得時に収益へ振替。",
  "Accounting estimates": "会計上の見積り（耐用年数・貸倒率・保証費用等）。見積りの変更はprospective処理（過去は修正しない）——エラー訂正（遡及修正）との区別がFAR頻出。",
  "Accounting period": "会計期間の公準。企業活動を人為的な期間に区切って報告する前提。決算整理仕訳の必要性の根拠。",
  "Sales proceeds": "売却手取額。固定資産売却損益＝売却手取額−帳簿価額の計算要素。",
  "Retirement (of long-lived assets)": "固定資産の除却。売却せず使用を終了。帳簿価額を全額損失に振替え、取得原価と減価償却累計額を両方消す仕訳。",
  "Retirement (of treasury stock)": "自己株式の消却。発行済株式数自体が減少する。取得原価とpar・APICの差の処理が問われる。",
  "Management judgment": "経営者の判断。見積り・会計方針選択に介在。AUDでは監査人がこれを評価する（estimates監査）。",
  "In-kind contribution": "現物出資。受け取った資産の公正価値で資本を計上。NFP会計では現物寄付の認識条件も頻出。",
  "Sales allowance": "売上値引。品質不良等による事後的な値引き。返品と合わせてcontra-revenue勘定で処理。",
  "Sales discount": "売上割引。早期支払に対する割引（2/10, n/30）。ASC 606では変動対価として取引価格から見積り控除する考え方も押さえる。",
  "Sales rebate": "売上割戻（リベート）。一定数量購入への払戻し。変動対価としてrefund liabilityを計上。",
  "Sales returns": "売上返品。ASC 606では予想返品分を収益から控除しrefund liability＋返品資産を計上する処理がFAR頻出。",
  "Credit terms": "与信条件。「2/10, n/30」＝10日以内支払なら2%割引、正味30日以内。この読み方は必須知識。",
  "Early order discount": "早期発注割引。取引価格の調整（変動対価）として扱う。",
  "Due date": "支払期限。手形の満期日計算（日数ベース）が出題されることがある。",
  "Operating cycle": "営業循環：現金→棚卸資産→売掛金→現金の期間。流動・固定分類の基準（1年との長い方）。",
  "Normal balance": "正常残高。資産・費用・配当は借方、負債・資本・収益は貸方。試算表問題の前提知識。",
  "Nonfinancial assets": "非金融資産（棚卸資産・PPE・無形資産等）。公正価値測定（ASC 820）はhighest and best use（最有効使用）で評価する点が金融資産との違い。",
  "Monetary receivables": "金銭債権。額面固定の債権で、外貨建なら為替差損益が生じる（monetary vs nonmonetaryの区別）。",
  "Mixed-attribute measurement model": "混合属性測定モデル。US GAAPは項目ごとに取得原価・公正価値等を使い分ける。B/S全体が単一の測定属性ではない点の理解。",
  "Implicit transaction": "暗黙的取引。時の経過等により生じる内部的事象（減価償却・費用の発生）。決算整理仕訳の対象。",
  "Securities": "有価証券。負債証券はHTM（償却原価）・Trading・AFSの3分類、持分証券は原則FVTNI——この分類と評価がFAR最頻出論点の一つ。",
  "Operating expenses": "営業費用。COGSとSG&Aを含む本業のコスト。non-operating（利息・投資損益）との区分がI/S表示で問われる。",
  "Other revenues and gains": "営業外収益・利得。受取利息・配当金・売却益等。multiple-step I/Sで営業利益の下に表示。",
  "Other expenses and losses": "営業外費用・損失。支払利息・売却損等。income before taxesの計算要素。",
  "Cost accounting": "原価計算。製品原価の集計（job order・process costing等）。主にBEC/BARの出題領域。",
  "Directly attributable costs": "直接起因コスト。資産の取得原価に含める付随費用（運送費・据付費・試運転費等）。土地・建物・機械それぞれの範囲がFAR頻出。",
  "Reorganization": "更生（Chapter 11）。事業継続しながら債務を再編。fresh-start reportingの適用条件が上級論点。",
  "Liquidation": "清算（Chapter 7）。liquidation basis of accounting（清算価値での測定）に切替える。going concernの対極。",
  "Authorized stock": "授権株式数。定款で定めた発行可能上限。authorized ≥ issued ≥ outstandingの関係を整理。",
  "Issued stock": "発行済株式。issued − treasury = outstanding（流通株式）。EPS計算はoutstandingベース。",
  "No-par-value stock": "無額面株式。発行価額全額をcommon stockに計上（stated valueがあればその超過分はAPIC）。",
  "Line item": "表示項目。F/S本体の各行。aggregation（集約）と分解表示の判断はmaterialityによる。",
  "Liquidation preference": "残余財産分配優先権。優先株主が普通株主に先立って分配を受ける権利。",
  "Dividend preference": "配当優先権。累積的（cumulative）か否かで未払配当（dividends in arrears）の扱いが変わる。arrearsは負債ではなく注記開示という点が頻出。",
  "Intangible assets with definite useful lives": "耐用年数確定無形資産（特許権等）。定額法で償却し、減損は2ステップテスト。",
  "Intangible assets with indefinite useful lives": "耐用年数不確定無形資産（商標権・のれん等）。償却せず、少なくとも年1回減損テスト（1ステップ：FV比較）。",
  "Internally generated intangible assets": "自己創設無形資産。R&D費用は原則発生時費用処理（US GAAP）。IFRSは開発費の資産化要件あり——代表的な基準差異。",
  "Accelerated depreciation methods": "加速償却法（DDB・SYD）。初期に多く償却。税務上有利で、会計との差が繰延税金負債を生む。",
  "Double-declining balance method": "2倍定率法。償却費＝期首帳簿価額×(2/耐用年数)。残存価額は計算に入れず下限としてのみ機能——この点がFAR頻出のひっかけ。",
  "Depreciation method": "減価償却方法。方法の変更は「見積りの変更」としてprospective処理する点が重要（会計方針の変更ではない）。",
  "Average cost method": "平均原価法。periodic（総平均）とperpetual（移動平均）で結果が異なる。",
  "Moving-average method": "移動平均法。perpetual方式の平均法。仕入の都度、平均単価を再計算。",
  "Last-in, first-out method": "後入先出法。物価上昇時：COGS高・利益低・在庫低（節税効果）。LIFO reserve・LIFO liquidationの論点、IFRS禁止がFAR頻出。",
  "Specific identification method": "個別法。高額・少量の在庫（宝石・自動車等）に適用。利益操作の余地がある点が指摘される。",
  "Cost formula for inventory": "棚卸資産の原価算定方式。FIFO・LIFO・平均法・個別法の選択。物的流れとの一致は不要。",
  "Direct write-off method": "直接償却法。貸倒発生時に費用化。matching原則に反しGAAP不可（税務では強制）——allowance法との対比が定番。",
  "Allowance method": "引当法。貸倒れを見積り事前に費用計上。GAAPの原則的方法。write-off時は Dr. Allowance / Cr. A/R（費用は出ない）点が頻出。",
  "DCF method": "割引キャッシュ・フロー法。将来C/Fを現在価値に割引く測定技法。減損測定・資産評価・ASC 820のincome approachで使用。",
  "Cost method": "原価法。自己株式会計の一般的方法（取得原価で計上、再発行差額はAPIC調整）。par value法との違いを整理。",
  "Audit committee": "監査委員会。取締役会内の独立委員会で外部監査人の選任・報酬・監督に責任。SOX法により上場企業に必須。AUD頻出。",
  "Audit firm": "監査法人。上場企業の監査はPCAOBに登録した事務所のみ。パートナーローテーション（5年）等の独立性ルールも押さえる。",
  "Independent auditors": "独立監査人。独立性（independence in fact and appearance）が監査の生命線。AUDの倫理・独立性論点の中心。",
  "Adverse opinion": "不適正意見。F/S全体に重要かつ広範（material and pervasive）な虚偽表示がある場合。意見の4類型の使い分けはAUD必須。",
  "Disclaimer of opinion": "意見不表明。監査範囲の制約が重要かつ広範で十分な証拠を入手できない場合。",
  "Internal control report": "内部統制報告書。SOX 404条：経営者による評価＋（大規模企業は）監査人による内部統制監査意見。",
  "IASB": "国際会計基準審議会。IFRSの設定主体。FASBとのコンバージェンスの経緯が背景知識として有用。",
  "IFRS": "国際財務報告基準。LIFO禁止・開発費資産化・減損戻入れ可・リバリュエーションモデル等、US GAAPとの主要差異がFARで問われる。",
  "SEC": "米国証券取引委員会。公開企業の会計基準設定の法的権限を持つ（FASBに委任）。Regulation S-X等の開示規制。",
  "Sarbanes-Oxley Act of 2002": "SOX法。PCAOB設立、経営者による内部統制評価（404条）、CEO/CFOの宣誓（302条）、監査人の非監査業務制限。AUD頻出。",
  "Securities Exchange Act of 1934": "1934年証券取引所法。流通市場の規制・継続開示（10-K・10-Q・8-K）・SEC設立の根拠法。1933年法（発行市場）との対比。",
  "Lenders": "融資者。財務報告の主要利用者（primary users）の一員。元利回収可能性の評価に情報を使う。",
  "Investors": "投資者。primary usersの中心。財務報告の目的は投資意思決定への有用情報の提供。",
  "Creditor": "債権者。支払能力・担保・カベナンツ遵守の評価にF/Sを利用。",
  "Management accounting": "管理会計。内部の意思決定・業績管理目的で、GAAPに拘束されない。財務会計との目的比較が定番。",
  "Manufacturing company": "製造会社。棚卸資産が3区分（材料・仕掛品・製品）。製造原価報告書の構造はBECでも登場。",
  "Merchandising company": "商品販売会社。棚卸資産はmerchandiseのみ。COGS計算（期首＋仕入−期末）の基本形。",
  "Sole proprietorship": "個人事業。所有者と事業が法的に一体（無限責任）。entity conceptでは会計上は分離して記録。",
  "SFAC": "財務会計概念書。FASBの概念フレームワーク（GAAPそのものではなく基準設定の指針）。目的・質的特性・構成要素・認識測定の体系がFAR頻出。",
  "Accounting books": "会計帳簿。主要簿（仕訳帳・元帳）と補助簿の体系。",
  "Accounting cycle": "会計サイクル：仕訳→転記→試算表→決算整理→修正後試算表→F/S作成→締切→繰越試算表。順序を問う問題が出る。",
  "Special journal": "特殊仕訳帳。売上帳・仕入帳・現金出納帳等、頻出取引を効率的に記録する帳簿。",
  "Balance brought forward": "前期繰越残高。permanent accounts（B/S科目）のみ繰り越される点がポイント。",
  "Balance carried forward": "次期繰越残高。temporary accounts（収益・費用・配当）は締切仕訳でゼロになる。",
  "Invoice": "インボイス（請求書）。取引の証憑書類。監査ではvouching（帳簿→証憑）の対象。",
  "Delivery note": "納品書。商品引渡しの証拠書類。カットオフテストで使用。",
  "Debit note": "デビット・ノート。買手が仕入返品等を売手に通知する書類。",
  "Credit note": "クレジット・ノート。売手が返品・値引を認めて買手に発行する書類。",
  "Loan on bill": "手形借入。約束手形を差し入れて行う借入。notes payableで記録。",
  "Loan on deeds": "証書借入。金銭消費貸借契約書による借入。日本的な区分だが勘定はloans payable。",
  "Current ratio": "流動比率 = 流動資産 ÷ 流動負債。短期支払能力の代表指標。取引が比率に与える影響（分子分母同額増減等）を問う問題がBAR/FARで頻出。",
  "Net working capital": "正味運転資本 = 流動資産 − 流動負債。プラスなら短期債務を流動資産でカバーできる状態。",
  "Short-term solvency": "短期的支払能力。current ratio・quick ratio（当座比率：在庫を除く）で測定。",
  "Return on equity": "ROE = Net income ÷ 平均株主資本。DuPont分解（利益率×回転率×レバレッジ）はBAR頻出。",
  "Verifiability": "検証可能性。補強的質的特性の一つ。独立した観察者が測定値に合意できる性質。",
  "Voucher": "証憑。取引の証拠書類。voucher system（支払承認制度）は内部統制の論点としてAUDで登場。",
  "Weighted-average method": "加重平均法。periodic方式：総原価÷総数量で単価算定。process costingでも同名の方法がある（BEC/BAR）。",
  "Working capital": "運転資本 = 流動資産 − 流動負債。営業活動に投下された短期資金。",
  "Working capital items": "運転資本項目。A/R・棚卸資産・A/P等。間接法C/F計算書で増減調整する項目群。",
  "Worksheet": "精算表。試算表→決算整理→F/Sの作成過程を一覧化する内部ツール。",
  "Write-down": "評価下げ。在庫のLCNRV切下げ、減損等。保守主義の現れ。",
  "Write-up": "評価上げ。US GAAPでは原則禁止（IFRSの再評価モデルとの差異）。",
  "Zero-coupon bond": "ゼロクーポン債（割引債）。利払いなし・大幅discount発行。実効金利法で利息費用を認識し帳簿価額が額面に近づいていく。",
  "Beginning balance": "期首残高。T勘定分析（期首＋増加−減少＝期末）で未知数を逆算する問題の起点。",
  "Board of directors": "取締役会。配当宣言・経営者の監督を行う機関。コーポレートガバナンスの中心（AUD/REG）。",
  "Bond with stock warrant": "ワラント債。分離可能なワラント付きは発行価額を社債とワラントに公正価値比で配分（with-and-without法）——転換社債（不可分）との処理の違いがFAR頻出。",
  "Bondholder": "社債保有者＝債権者。株主と異なり議決権なし・利息受取権あり。",
  "Business failure": "倒産。監査の失敗（audit failure）とは異なる概念——この区別はAUDで問われる。",
  "Calendar year": "暦年（1/1〜12/31）。fiscal year（任意の12ヶ月）との対比。",
  "Callable bond": "コーラブル債。発行者が期限前償還できる権利付き。行使時は帳簿価額とcall価格の差が償還損益。",
  "Capital reduction": "減資。法定資本を減少させる手続。欠損填補等に利用。",
  "Carrying amount": "帳簿価額。減損テスト・売却損益・償還損益すべての比較基準となる値。",
  "Carrying value": "帳簿価額（carrying amount・book valueと同義）。用語の言い換えに対応できるように。",
  "Cash contribution": "金銭出資。払込金額でcommon stock＋APICを計上。現物出資（公正価値評価）との対比。",
  "Cash disbursement": "現金支出。内部統制では支払承認・職務分掌がAUDの頻出テーマ。",
  "Cash discount": "現金割引。早期支払への割引。買手側はpurchase discount、売手側はsales discountとして処理。",
  "Cash dividend": "現金配当。宣言時に負債計上、支払時に取崩し。R/Eの減少要因。",
  "Cash receipt": "現金収入。lockbox等の内部統制（AUD）、cash-basis利益の構成要素。",
  "Cash transaction": "現金取引。即時に現金が動く取引。信用取引（credit transaction）との対比。",
  "Cash-basis accounting": "現金主義会計。GAAP不適合。cash-basis利益⇔accrual-basis利益の変換計算（A/R・A/P・前払・前受の増減調整）がFAR定番。",
  "Certified Internal Auditor": "公認内部監査人（CIA）。内部監査の専門資格。外部監査人との役割の違い、内部監査の利用（AUD）に関連。",
  "Chart of accounts": "勘定科目表。全勘定の体系的リスト。内部統制の基礎インフラ。",
  "Chief Executive Officer": "CEO。SOX 302条によりCFOと共にF/Sの正確性を宣誓する義務。",
  "Chief Financial Officer": "CFO。財務報告の責任者。SOX法の宣誓義務・クローバック条項の対象。",
  "Chief Operating Officer": "COO。業務執行の責任者。ガバナンス構造の一員。",
  "Closing adjusting entries": "決算整理仕訳。未収・未払・前払・前受・減価償却・貸倒見積り等。FARの計算問題の基礎となる必須スキル。",
  "Closing adjustments": "決算整理。試算表をaccrual-basisのF/Sに変換するプロセス。",
  "Closing entries": "締切仕訳。収益・費用をincome summaryへ、純利益をR/Eへ、配当をR/Eへ振替。temporary accountsをゼロにする。",
  "Closing of the books": "帳簿の締切り。締切後はB/S科目（permanent accounts）のみ残高が残る。",
  "Common dividend": "普通配当金。優先配当を支払った後の残額から支払われる。EPS計算の分子調整に関連。",
  "Common shareholders": "普通株主。議決権と残余請求権を持つ。basic EPSは普通株主に帰属する利益で計算。",
  "Comparability": "比較可能性。補強的質的特性。企業間・期間比較を可能にする。consistency（継続性）はその手段。",
  "Completeness": "完全性。忠実な表現の構成要素。必要な情報がすべて含まれていること。",
  "Confirmatory value": "確認価値。過去の評価を確認・修正する情報の性質。予測価値とともにrelevanceを構成。",
  "Conservatism": "保守主義。不確実な状況では利益・資産を控えめに。LCNRV・偶発損失の認識（利得は認識しない）の背景思想。ただし概念フレームワーク上はneutralityと緊張関係。",
  "Contra account": "評価勘定（反対勘定）。主勘定から控除して表示（累計償却額・貸倒引当金・売上返品等）。normal balanceが主勘定と逆になる。",
  "Control": "支配。連結の基準（議決権50%超等）。ASC 606でも「支配の移転」が収益認識のタイミングを決める。",
  "Convertible bond": "転換社債。US GAAPでは原則一体処理（負債のみ）——分離可能ワラント債（配分処理）との違いがFAR頻出。転換時は帳簿価額法が一般的。",
  "Corporate bond": "社債。企業が発行する債券。国債（Treasury）との対比で信用リスクを含む。",
  "Corporate officers": "執行役員。取締役会が選任し日常業務を執行。",
  "Corporation": "株式会社。法人格・有限責任・株式譲渡性・継続性が特徴。REGでは設立・課税（二重課税 vs S corp）も問われる。",
  "Earnings per share": "EPS = (Net income − 優先配当) ÷ 加重平均流通株式数。株式分割・株式配当は遡及調整、diluted EPSの希薄化計算がFAR頻出。",
  "End of the period": "期末。決算整理仕訳・実地棚卸・カットオフテストの基準時点。",
  "Ending balance": "期末残高。期首＋増加−減少。T勘定逆算問題の頻出パターン。",
  "Enhancing qualitative characteristics": "補強的質的特性：比較可能性・検証可能性・適時性・理解可能性の4つ。基本的特性（relevance・faithful representation）との階層を暗記。",
  "Entity concept": "企業実体の公準。企業を所有者から独立した会計単位とみなす。個人事業でも事業と家計を分離。",
  "Event": "事象。取引以外も含む経済的出来事。認識要件を満たせば記録対象。",
  "Exchange transaction": "交換取引。対価性のある取引。NFP会計では交換取引か寄付（contribution）かの判定が頻出。",
  "Expense-related accruals": "費用側の見越し（未払費用）。発生済み・未払い。Dr. Expense / Cr. Payable。",
  "Expense-related prepayments": "費用側の繰延べ（前払費用）。支払済み・未発生。資産計上後、期間配分。",
  "Explicit transaction": "明示的取引。外部との取引で証憑が存在。暗黙的取引（決算整理の対象）との対比。",
  "Face amount": "額面金額。社債の償還額・利息計算（額面×表面利率）の基準。",
  "Fair value less costs of disposal": "処分コスト控除後公正価値。IFRSの回収可能価額の一方（もう一方は使用価値）。GAAPでは減損測定に公正価値を直接使用。",
  "Fair value principle": "時価主義。金融商品等に適用。取得原価主義とのmixed-attribute体系の一翼。",
  "Faithful representation": "忠実な表現。基本的質的特性の一つ（complete・neutral・free from error）。relevanceとセットで暗記必須。",
  "FASB": "財務会計基準審議会。US GAAP（ASC）の設定主体。独立の民間機関でSECから権限委任を受ける構造が問われる。",
  "Financial Accounting Standards Board": "FASBの正式名称。7名の常勤メンバー。ASU（会計基準更新書）を通じてASCを改訂する。",
  "Financial assets": "金融資産。現金・持分証券・債権等。分類（AC・FVOCI・FVTNI）と評価がFAR最重要領域。",
  "Financial position": "財政状態。B/Sが示す資産・負債・資本の状態。statement of financial positionはB/Sの正式名称。",
  "Financial soundness": "財務健全性。solvency・liquidity指標で評価される総合的な安全性。",
  "Fiscal year": "会計年度。任意の連続12ヶ月。小売業の52/53週年度もある。",
  "Fixed-rate coupon bond": "固定利付債。表面利率が満期まで一定。金利変動時の債券価格変動（逆相関）の理解も有用。",
  "Floating-rate coupon bond": "変動利付債。基準金利に連動してクーポンが変わる。金利リスクのヘッジ関連（デリバティブ会計）につながる。",
  "Free from error": "誤謬の不存在。忠実な表現の構成要素。見積りであっても手続きに誤りがないこと。",
  "Fundamental qualitative characteristics": "基本的質的特性：relevance（目的適合性）とfaithful representation（忠実な表現）の2つ。この2つが揃って初めて有用な情報となる。",
  "General and administrative expenses": "一般管理費。役員報酬・本社家賃・法務費用等。販売費と合わせてSG&A。",
  "General journal": "一般仕訳帳。特殊仕訳帳に該当しない取引（決算整理・訂正仕訳等）を記録。",
  "General ledger": "総勘定元帳。全勘定の増減と残高を集約する主要簿。試算表の作成元。",
  "Generally accepted accounting principles": "一般に認められた会計原則（GAAP）。ASCが唯一の権威的基準。非権威的文献との階層（ASC最優先）が問われる。",
  "Going-concern concept": "継続企業の公準。取得原価主義・減価償却の理論的前提。清算が近ければliquidation basisへ切替。",
  "Goods available for sale": "販売可能商品 = 期首棚卸 + 当期仕入。COGSと期末在庫に配分される合計額。COGS計算問題の中間値。",
  "Goodwill": "のれん。企業結合でのみ計上（買収価額 − 識別可能純資産の公正価値）。自己創設のれん計上不可・非償却・年1回減損テスト（qualitative assessment可）がFAR頻出。",
  "Government grants": "政府補助金。IAS 20は収益アプローチ（繰延収益）。US GAAPには包括基準がなくIAS 20類推等が実務——基準差異として登場。",
  "Gross loss": "売上総損失。COGSがnet salesを上回る状態。",
  "Gross sales": "総売上高。返品・値引・割引控除前。net salesへの調整計算の起点。",
  "Historical cost principle": "取得原価主義。検証可能性が長所。PPE・棚卸資産等に適用され、公正価値測定項目との混合体系を成す。"
};

function showWordDetail(elId, c) {
  const el = document.getElementById(elId);
  const freqTag = `<span class="wd-tag freq${c.freq}">${FREQ_LABELS[c.freq]}</span>`;
  const catTag = `<span class="wd-tag">${CAT_LABELS[c.cat]}${c.sub ? ' / ' + c.sub : ''}</span>`;
  const unitTag = c.unit ? `<span class="wd-tag">参照: ${c.unit}</span>` : '';
  const note = c.note ? `<div class="wd-note">${c.note}</div>` : '';
  const uscpa = USCPA_DETAILS[c.en] ? `<div class="wd-uscpa">${USCPA_DETAILS[c.en]}</div>` : '';
  el.innerHTML = `<div class="wd-term">${c.en}</div><div class="wd-ja">${c.ja}</div><div class="wd-meta">${freqTag}${catTag}${unitTag}</div>${note}${uscpa}`;
  el.classList.add('show');
}

function hideWordDetail(elId) {
  const el = document.getElementById(elId);
  el.classList.remove('show');
  el.innerHTML = '';
}

  if (/^https?:\/\/(localhost|127\.0\.0\.1|192\.168\.)/i.test(url)) {

  const linkInput = document.getElementById('shareLinkInput');
  const copiedMsg = document.getElementById('shareCopiedMsg');
  linkInput.select();
  const finish = () => { copiedMsg.textContent = '✓ コピーしました'; setTimeout(() => { copiedMsg.textContent = ''; }, 2000); };

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const showFilter = (m !== 'freq');
  document.getElementById('filterBar').style.display = showFilter ? 'flex' : 'none';
  document.getElementById('flashView').classList.toggle('hidden', m !== 'flash');
  document.getElementById('inputView').classList.toggle('active', m === 'input');

function applyLimit(cards, limit) {
  return (limit > 0 && limit < cards.length) ? cards.slice(0, limit) : [...cards];
}

function buildDeck() {
  deck = getFilteredCards(); idx = 0; correct = 0; wrong = 0;
  iDeck = applyLimit(getFilteredCards(), inputLimit); iIdx = 0; iCorrect = 0; iWrong = 0;
  renderCard(); updateStats();
  renderInput(); updateIStats();
  if (currentMode === 'quiz') buildQuizDeck();
}

// ======== Flashcard ========
function renderCard() {
  if (!deck.length) {
    ['cardFrontMain','cardFrontSub','cardCategory','cardBackMain','cardBackSub','cardCategoryBack'].forEach(id => document.getElementById(id).textContent = '');
    document.getElementById('cardFrontMain').textContent = '該当カードなし';
    document.getElementById('progressText').textContent = '0 / 0';
    document.getElementById('progressFill').style.width = '0%';
    setNoteEl(document.getElementById('cardFrontNote'), null);
    setNoteEl(document.getElementById('cardNote'), null);
    return;
  }
  const c = deck[idx]; const col = CAT_COLORS[c.cat];
  document.getElementById('card').classList.remove('flipped'); flipped = false;
  document.getElementById('resultBtns').style.display = 'none';
  ['cardCategory','cardCategoryBack'].forEach(id => { document.getElementById(id).textContent = CAT_LABELS[c.cat]; document.getElementById(id).style.color = col; });
  document.getElementById('cardFrontMain').textContent = c.en;
  document.getElementById('cardFrontSub').textContent = c.sub;
  document.getElementById('cardBackMain').textContent = c.ja;
  document.getElementById('cardBackSub').textContent = c.en;
  setNoteEl(document.getElementById('cardFrontNote'), c.note);
  setNoteEl(document.getElementById('cardNote'), c.note);
  const unitEl = document.getElementById('cardUnit');
  if (c.unit) { unitEl.textContent = '参照: ' + c.unit; unitEl.style.display = 'block'; }
  else { unitEl.style.display = 'none'; }
  const pct = deck.length > 1 ? (idx / (deck.length - 1)) * 100 : 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === deck.length - 1;
}
function flipCard() {
  if (!deck.length) return;
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
  document.getElementById('resultBtns').style.display = flipped ? 'flex' : 'none';
  if (flipped) showReviewBtn('flash', deck[idx].en);
  else hideReviewBtn('flash');
}
function markResult(ok) {
  const c = deck[idx];
  if (ok) correct++; else { wrong++; reviewSet.add(c.en); }
  updateStats();
  hideReviewBtn('flash');
  if (idx < deck.length - 1) { idx++; renderCard(); }
  else { document.getElementById('cardFrontMain').textContent = '完了！'; document.getElementById('cardFrontSub').textContent = `覚えた ${correct} / 覚えてない ${wrong}`; document.getElementById('cardCategory').textContent = ''; document.getElementById('card').classList.remove('flipped'); document.getElementById('resultBtns').style.display = 'none'; }
}
function nextCard() { if (idx < deck.length - 1) { idx++; renderCard(); } }
function prevCard() { if (idx > 0) { idx--; renderCard(); } }
function shuffleFlash() {
  for (let i = deck.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
  idx=0; correct=0; wrong=0; renderCard(); updateStats();
}
function updateStats() {
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statRemain').textContent = Math.max(0, deck.length - idx);
}

  inputLimit = parseInt(val);
  iDeck = applyLimit(getFilteredCards(), inputLimit); iIdx = 0; iCorrect = 0; iWrong = 0;
  renderInput(); updateIStats();
}

function renderInput() {
  iChecked = false;
  document.getElementById('iBtnNext').style.display = 'none';
  const f = document.getElementById('iField');
  f.value = ''; f.className = 'input-field';
  document.getElementById('iFeedback').textContent = '';
  document.getElementById('iFeedback').className = 'input-feedback';
  document.getElementById('iAnswer').textContent = '';
  hideWordDetail('iDetail');
  if (!iDeck.length) {
    document.getElementById('iQuestion').textContent = '該当カードなし';
    document.getElementById('iQsub').textContent = '';
    document.getElementById('iCardCategory').textContent = '';
    document.getElementById('iProgressText').textContent = '0 / 0';
    document.getElementById('iProgressFill').style.width = '0%';
    setNoteEl(document.getElementById('iNoteHint'), null);
    return;
  }
  const c = iDeck[iIdx];
  document.getElementById('iCardCategory').textContent = CAT_LABELS[c.cat];
  document.getElementById('iCardCategory').style.color = CAT_COLORS[c.cat];
  if (inputDir === 'ja-en') {
    document.getElementById('iQuestion').textContent = c.ja;
    document.getElementById('iQsub').textContent = c.sub;
    // In ja-en mode, show note as hint so user knows which English is expected
    setNoteEl(document.getElementById('iNoteHint'), c.note);
    f.placeholder = '英語で入力してください';
  } else {
    document.getElementById('iQuestion').textContent = c.en;
    document.getElementById('iQsub').textContent = c.sub;
    // In en-ja mode, no hint needed (synonyms all accepted)
    setNoteEl(document.getElementById('iNoteHint'), null);
    f.placeholder = '日本語で入力してください（同義語もすべて正解）';
  }
  const pct = iDeck.length > 1 ? (iIdx / (iDeck.length - 1)) * 100 : 100;
  document.getElementById('iProgressFill').style.width = pct + '%';
  document.getElementById('iProgressText').textContent = `${iIdx + 1} / ${iDeck.length}`;
  f.focus(); updateIStats();
}

function checkInput() {
  if (iChecked || !iDeck.length) return;
  iChecked = true;
  const c = iDeck[iIdx];
  const input = document.getElementById('iField').value;
  let ok = false;
  if (inputDir === 'ja-en') {
    ok = normEn(input) === normEn(c.en);
  } else {
    // Japanese input: accept all synonym variants
    const accepted = acceptedJaAnswers(c);
    const normInput = normJa(input);
    ok = accepted.some(a => normJa(a) === normInput || a === input.trim());
  }
  document.getElementById('iField').className = 'input-field ' + (ok ? 'correct' : 'incorrect');
  const fb = document.getElementById('iFeedback');
  fb.textContent = ok ? '正解！' : '不正解';
  fb.className = 'input-feedback ' + (ok ? 'ok' : 'ng');
  if (!ok) {
    const ans = inputDir === 'ja-en' ? c.en : c.ja;
    document.getElementById('iAnswer').textContent = `正解: ${ans}${c.unit ? ' ／ 参照: ' + c.unit : ''}`;
  }
  if (ok) iCorrect++; else iWrong++;
  updateIStats();
  document.getElementById('iBtnNext').style.display = 'inline-block';
  showReviewBtn('input', c.en);
  showWordDetail('iDetail', c);
}

function nextInput() {
  hideReviewBtn('input');
  if (iIdx < iDeck.length - 1) { iIdx++; renderInput(); }
  else {
    document.getElementById('iQuestion').textContent = '完了！';
    document.getElementById('iQsub').textContent = `正解 ${iCorrect} / 不正解 ${iWrong}`;
    document.getElementById('iCardCategory').textContent = '';
    document.getElementById('iField').style.display = 'none';
    document.getElementById('iFeedback').textContent = '';
    document.getElementById('iAnswer').textContent = '';
    document.getElementById('iBtnNext').style.display = 'none';
    setNoteEl(document.getElementById('iNoteHint'), null);
  }
}
function skipInput() {
  if (!iDeck.length) return;
  iWrong++;
  updateIStats();
  if (iIdx < iDeck.length - 1) { iIdx++; renderInput(); } else nextInput();
}
function shuffleInput() {
  for (let i=iDeck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[iDeck[i],iDeck[j]]=[iDeck[j],iDeck[i]];}
  iIdx=0;iCorrect=0;iWrong=0;renderInput();updateIStats();
}
function updateIStats() {
  document.getElementById('iStatCorrect').textContent = iCorrect;
  document.getElementById('iStatWrong').textContent = iWrong;
  document.getElementById('iStatRemain').textContent = Math.max(0, iDeck.length - iIdx);
}

// ======== Quiz ========
function setQuizDir(dir) {
  quizDir = dir;
  document.getElementById('quizDirEnJa').classList.toggle('active', dir === 'en-ja');
  document.getElementById('quizDirJaEn').classList.toggle('active', dir === 'ja-en');
  buildQuizDeck();
}

function setQuizLimit(val) {
  quizLimit = parseInt(val);
  buildQuizDeck();
}

function buildQuizDeck() {
  qDeck = applyLimit(getFilteredCards(), quizLimit); qIdx = 0; qCorrect = 0; qWrong = 0; qAnswered = false;
  renderQuiz(); updateQStats();
}

function renderQuiz() {
  qAnswered = false;
  document.getElementById('qBtnNext').style.display = 'none';
  document.getElementById('qFeedback').textContent = '';
  document.getElementById('qFeedback').className = 'quiz-feedback';
  document.getElementById('qNote').style.display = 'none';
  hideWordDetail('qDetail');
  if (!qDeck.length) {
    document.getElementById('qQuestion').textContent = '該当カードなし';
    document.getElementById('qChoices').innerHTML = '';
    document.getElementById('qProgressText').textContent = '0 / 0';
    document.getElementById('qProgressFill').style.width = '0%';
    setNoteEl(document.getElementById('qNoteHint'), null);
    return;
  }
  const c = qDeck[qIdx];
  const col = CAT_COLORS[c.cat];
  document.getElementById('qCardCategory').textContent = CAT_LABELS[c.cat];
  document.getElementById('qCardCategory').style.color = col;

  if (quizDir === 'en-ja') {
    document.getElementById('qQuestion').textContent = c.en;
    document.getElementById('qQsub').textContent = c.sub;
    // Show note on question side for en-ja (helps identify which Japanese)
    setNoteEl(document.getElementById('qNoteHint'), c.note);
  } else {
    document.getElementById('qQuestion').textContent = c.ja;
    document.getElementById('qQsub').textContent = c.sub;
    // In ja-en mode, show note so user knows which English is expected
    setNoteEl(document.getElementById('qNoteHint'), c.note);
  }

  // Build 4 choices
  const wrongs = pickWrongChoices(c, 3, quizDir);
  const choices = [c, ...wrongs].sort(() => Math.random() - 0.5);
  const choicesEl = document.getElementById('qChoices');
  choicesEl.innerHTML = '';
  choices.forEach(ch => {
    const label = quizDir === 'en-ja' ? ch.ja : ch.en;
    const btn = document.createElement('button');
    btn.className = 'quiz-choice';
    btn.textContent = label;
    btn.onclick = () => selectChoice(btn, c, ch, quizDir);
    choicesEl.appendChild(btn);
  });

  const pct = qDeck.length > 1 ? (qIdx / (qDeck.length - 1)) * 100 : 100;
  document.getElementById('qProgressFill').style.width = pct + '%';
  document.getElementById('qProgressText').textContent = `${qIdx + 1} / ${qDeck.length}`;
  updateQStats();
}

function selectChoice(btn, correctCard, selectedCard, dir) {
  if (qAnswered) return;
  qAnswered = true;
  // Determine correctness
  let ok;
  if (dir === 'en-ja') {
    ok = normJa(selectedCard.ja) === normJa(correctCard.ja);
  } else {
    ok = normEn(selectedCard.en) === normEn(correctCard.en);
  }
  // Style all buttons
  const allBtns = document.getElementById('qChoices').querySelectorAll('.quiz-choice');
  allBtns.forEach(b => {
    b.disabled = true;
    const bLabel = b.textContent;
    const correctLabel = dir === 'en-ja' ? correctCard.ja : correctCard.en;
    if (bLabel === btn.textContent && ok) b.className = 'quiz-choice selected-correct';
    else if (bLabel === btn.textContent && !ok) b.className = 'quiz-choice selected-wrong';
    else if (bLabel === correctLabel) b.className = 'quiz-choice reveal-correct';
  });
  const fb = document.getElementById('qFeedback');
  fb.textContent = ok ? '正解！' : '不正解';
  fb.className = 'quiz-feedback ' + (ok ? 'ok' : 'ng');
  if (ok) qCorrect++; else qWrong++;
  updateQStats();
  document.getElementById('qBtnNext').style.display = 'inline-block';
  showReviewBtn('quiz', correctCard.en);
  showWordDetail('qDetail', correctCard);
}

function nextQuiz() {
  hideReviewBtn('quiz');
  if (qIdx < qDeck.length - 1) { qIdx++; renderQuiz(); }
  else {
    document.getElementById('qQuestion').textContent = '完了！';
    document.getElementById('qQsub').textContent = `正解 ${qCorrect} / 不正解 ${qWrong}`;
    document.getElementById('qCardCategory').textContent = '';
    document.getElementById('qChoices').innerHTML = '';
    document.getElementById('qFeedback').textContent = '';
    document.getElementById('qNote').style.display = 'none';
    document.getElementById('qBtnNext').style.display = 'none';
    setNoteEl(document.getElementById('qNoteHint'), null);
  }
}
function shuffleQuiz() {
  for (let i=qDeck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[qDeck[i],qDeck[j]]=[qDeck[j],qDeck[i]];}
  qIdx=0;qCorrect=0;qWrong=0;renderQuiz();updateQStats();
}
function updateQStats() {
  document.getElementById('qStatCorrect').textContent = qCorrect;
  document.getElementById('qStatWrong').textContent = qWrong;
  document.getElementById('qStatRemain').textContent = Math.max(0, qDeck.length - qIdx);
}

// ======== Frequency ========
function initFreqView() {
  document.getElementById('freqSelector').style.display = 'flex';
  document.getElementById('freqSession').classList.remove('active');
  document.getElementById('freqCount1').textContent = CARDS.filter(c=>c.freq===1).length + '語';
  document.getElementById('freqCount2').textContent = CARDS.filter(c=>c.freq===2).length + '語';
  document.getElementById('freqCount3').textContent = CARDS.filter(c=>c.freq===3).length + '語';
  document.getElementById('freqCountAll').textContent = CARDS.length + '語';
}
function setFreqLimit(val) {
  freqLimit = parseInt(val);
}
function startFreqSession(level) {
  const pool = level === 0 ? [...CARDS].sort((a,b)=>a.freq-b.freq) : CARDS.filter(c=>c.freq===level);
  fDeck = applyLimit(pool, freqLimit);
  fIdx=0; fCorrect=0; fWrong=0; fFlipped=false;
  document.getElementById('freqSelector').style.display = 'none';
  document.getElementById('freqSession').classList.add('active');
  const h = {0:'全レベル（頻度順）',1:'★★★ 頻出',2:'★★☆ 標準',3:'★☆☆ 発展'};
  document.getElementById('freqSessionHeader').textContent = h[level] + ` — ${fDeck.length}語`;
  renderFreqCard();
}
function backToFreqSelector() {
  document.getElementById('freqSession').classList.remove('active');
  document.getElementById('freqSelector').style.display = 'flex';
}
function renderFreqCard() {
  if (!fDeck.length) return;
  const c = fDeck[fIdx]; const col = CAT_COLORS[c.cat];
  document.getElementById('fCard').classList.remove('flipped'); fFlipped=false;
  document.getElementById('fResultBtns').style.display = 'none';
  ['fCardCategory','fCardCategoryBack'].forEach(id=>{document.getElementById(id).textContent=CAT_LABELS[c.cat];document.getElementById(id).style.color=col;});
  document.getElementById('fCardFrontMain').textContent = c.en;
  document.getElementById('fCardFrontSub').textContent = c.sub;
  document.getElementById('fCardBackMain').textContent = c.ja;
  document.getElementById('fCardBackSub').textContent = c.en;
  setNoteEl(document.getElementById('fCardFrontNote'), c.note);
  setNoteEl(document.getElementById('fCardNote'), c.note);
  const fUnitEl = document.getElementById('fCardUnit');
  if (c.unit) { fUnitEl.textContent = '参照: ' + c.unit; fUnitEl.style.display = 'block'; }
  else { fUnitEl.style.display = 'none'; }
  document.getElementById('fFreqBadge').innerHTML = `<span class="freq-badge" style="background:${FREQ_COLORS[c.freq]}">${FREQ_LABELS[c.freq]}</span>`;
  const pct = fDeck.length > 1 ? (fIdx/(fDeck.length-1))*100 : 100;
  document.getElementById('fProgressFill').style.width = pct+'%';
  document.getElementById('fProgressFill').style.background = FREQ_COLORS[c.freq];
  document.getElementById('fProgressText').textContent = `${fIdx+1} / ${fDeck.length}`;
  document.getElementById('fBtnPrev').disabled = fIdx===0;
  document.getElementById('fBtnNext').disabled = fIdx===fDeck.length-1;
  updateFStats();
}
function flipFreqCard() {
  if (!fDeck.length) return;
  fFlipped=!fFlipped;
  document.getElementById('fCard').classList.toggle('flipped',fFlipped);
  document.getElementById('fResultBtns').style.display=fFlipped?'flex':'none';
  if (fFlipped) showReviewBtn('freq', fDeck[fIdx].en);
  else hideReviewBtn('freq');
}
function markFreqResult(ok) {
  const c=fDeck[fIdx];
  if(ok) fCorrect++; else { fWrong++; reviewSet.add(c.en); }
  updateFStats();
  hideReviewBtn('freq');
  if(fIdx<fDeck.length-1){fIdx++;renderFreqCard();}
  else{document.getElementById('fCardFrontMain').textContent='完了！';document.getElementById('fCardFrontSub').textContent=`覚えた ${fCorrect} / 要復習 ${fWrong}`;document.getElementById('fCardCategory').textContent='';document.getElementById('fCard').classList.remove('flipped');document.getElementById('fResultBtns').style.display='none';}
}
function nextFreqCard(){if(fIdx<fDeck.length-1){fIdx++;renderFreqCard();}}
function prevFreqCard(){if(fIdx>0){fIdx--;renderFreqCard();}}
function shuffleFreq(){
  for(let i=fDeck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fDeck[i],fDeck[j]]=[fDeck[j],fDeck[i]];}
  fIdx=0;fCorrect=0;fWrong=0;renderFreqCard();
}
function updateFStats(){
  document.getElementById('fStatCorrect').textContent=fCorrect;
  document.getElementById('fStatWrong').textContent=fWrong;
  document.getElementById('fStatRemain').textContent=Math.max(0,fDeck.length-fIdx);
}

// ======== List ========
function renderList() {
  const src = getFilteredCards();
  document.getElementById('listBody').innerHTML = src.map(c => {
    const col = CAT_COLORS[c.cat]||'#888';
    const inReview = reviewSet.has(c.en);
    return `<tr style="${inReview?'background:#fff5f5':''}">
      <td><strong>${c.en}</strong><br><small style="color:#a0aec0">${c.sub}</small></td>
      <td>${c.ja}${c.note?`<br><small style="color:#b7791f;font-size:0.75rem">${c.note}</small>`:''}${c.unit ? '<br><small style="color:#a0aec0;font-size:0.72rem">参照: '+c.unit+'</small>' : ''}</td>
      <td><span class="cat-badge" style="background:${col}">${CAT_LABELS[c.cat]}</span>${inReview?' <span style="color:#fc8181;font-size:0.72rem">復習</span>':''}</td>
      <td><span class="freq-badge" style="background:${FREQ_COLORS[c.freq]}">${FREQ_LABELS[c.freq]}</span></td>
    </tr>`;
  }).join('');
}

buildDeck();
buildQuizDeck();
</script>
</body>
